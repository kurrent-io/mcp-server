name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check server.py --select=E9,F63,F7,F82 --target-version=py39
        # Exit-zero treats all errors as warnings
        ruff check server.py --exit-zero --target-version=py39
      continue-on-error: true

    - name: Run unit tests
      run: |
        pytest tests/test_tools -v -m "unit" --cov=server --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
      continue-on-error: true

    - name: Generate coverage report
      run: |
        coverage report
        coverage html

    - name: Upload coverage HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      kurrentdb:
        image: ghcr.io/eventstore/eventstore:latest
        env:
          EVENTSTORE_INSECURE: true
          EVENTSTORE_RUN_PROJECTIONS: all
          EVENTSTORE_START_STANDARD_PROJECTIONS: true
          EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: true
        ports:
          - 2113:2113
        options: >-
          --health-cmd "curl -f http://localhost:2113/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Wait for KurrentDB
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:2113/health/live; do sleep 2; done'

    - name: Run integration tests
      env:
        KURRENTDB_CONNECTION_STRING: "esdb://localhost:2113?tls=false"
      run: |
        pytest tests/test_integration -v -m "integration" --timeout=60
      continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: always()

    steps:
    - name: Check test results
      run: |
        echo "Unit tests completed"
        echo "Integration tests completed"
        echo "Check individual job results for details"

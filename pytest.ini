[pytest]
# Pytest configuration for KurrentDB MCP Server

# Minimum version
minversion = 8.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Add options that should always be used
addopts =
    # Show summary of all test outcomes
    -ra
    # Show extra test summary info
    --strict-markers
    --strict-config
    # Coverage options (if coverage is installed)
    --cov=server
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Show local variables in tracebacks
    --showlocals
    # Verbose output
    --verbose
    # Show print statements
    -s

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require KurrentDB instance)
    e2e: End-to-end tests (full system tests)
    slow: Slow running tests
    asyncio: Asynchronous tests

# Async settings
asyncio_mode = auto

# Output options
console_output_style = progress

# Timeout for tests (requires pytest-timeout)
timeout = 300

# Filter warnings
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning

# Log settings
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage settings
[coverage:run]
source = .
omit =
    tests/*
    setup.py
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
